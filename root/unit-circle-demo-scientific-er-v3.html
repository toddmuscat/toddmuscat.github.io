<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unit Circle — Trigonometry Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0c0e14;
    --panel: #12151e;
    --border: #1e2233;
    --text: #c8cdd8;
    --text-dim: #5a6178;
    --accent-sin: #ff6b6b;
    --accent-cos: #4ecdc4;
    --accent-hyp: #ffe66d;
    --accent-angle: #a78bfa;
    --accent-theta: #f472b6;
    --grid: #1a1d2b;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  h1 {
    font-family: 'JetBrains Mono', monospace;
    text-align: center;
    padding: 24px 0 4px;
    font-size: 1.3rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent-angle);
  }
  .subtitle {
    text-align: center;
    font-size: 0.82rem;
    color: var(--text-dim);
    margin-bottom: 16px;
  }

  .container {
    display: flex;
    gap: 16px;
    padding: 0 20px 20px;
    max-width: 1400px;
    margin: 0 auto;
    flex-wrap: wrap;
    justify-content: center;
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    position: relative;
  }
  .panel-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 10px;
  }

  .left-panel { flex: 0 0 520px; }
  .right-panel { flex: 1 1 500px; min-width: 400px; }

  canvas { display: block; border-radius: 8px; }

  /* Controls */
  .controls {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
    margin-top: 14px;
  }
  .control-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .control-group label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .control-group input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 200px;
    height: 6px;
    border-radius: 3px;
    background: var(--border);
    outline: none;
  }
  .control-group input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--accent-angle);
    cursor: pointer;
    box-shadow: 0 0 10px rgba(167,139,250,0.5);
  }
  .control-group input[type="range"]::-moz-range-thumb {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--accent-angle);
    cursor: pointer;
    box-shadow: 0 0 10px rgba(167,139,250,0.5);
    border: none;
  }

  .toggle-group {
    display: flex;
    align-items: center;
    margin-top: 18px;
    padding: 9px 12px;
    min-height: 34px;
    border-radius: 10px;
    background: rgba(167, 139, 250, 0.08);
    border: 1px solid rgba(167, 139, 250, 0.22);
    user-select: none;
  }
  .toggle-group input[type="checkbox"] {
    width: 16px;
    height: 16px;
    accent-color: var(--accent-angle);
    cursor: pointer;
    margin-right: 8px;
    flex: 0 0 auto;
  }
  .toggle-group label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.9px;
    text-transform: none;
    color: var(--text);
    cursor: pointer;
    line-height: 1;
  }

  .info-boxes {
    display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px;
  }
  .info-box {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    padding: 6px 12px;
    border-radius: 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    min-width: 100px;
    text-align: center;
  }
  .info-box .label { font-size: 0.6rem; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 2px; }
  .info-box .value { font-weight: 700; font-size: 0.95rem; }
  .sin-val { color: var(--accent-sin); }
  .cos-val { color: var(--accent-cos); }
  .deg-val { color: var(--accent-angle); }
  .rad-val { color: var(--accent-theta); }

  .btn-row { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    padding: 5px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.5px;
  }
  .btn:hover { border-color: var(--accent-angle); color: var(--accent-angle); }
  .btn.active { background: var(--accent-angle); color: var(--bg); border-color: var(--accent-angle); }

  .legend {
    display: flex; gap: 16px; margin-top: 10px; flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; font-family: 'JetBrains Mono', monospace; }
  .legend-swatch { width: 14px; height: 3px; border-radius: 2px; }

  body.scientific-mode h1 {
    text-shadow: 0 0 16px rgba(167, 139, 250, 0.35), 0 0 32px rgba(244, 114, 182, 0.15);
  }
  body.scientific-mode .panel {
    box-shadow: 0 0 0 1px rgba(255,255,255,0.03), 0 0 22px rgba(167, 139, 250, 0.08);
  }
  body.scientific-mode .toggle-group {
    background: linear-gradient(90deg, rgba(167, 139, 250, 0.14), rgba(244, 114, 182, 0.12));
    border-color: rgba(244, 114, 182, 0.28);
    box-shadow: 0 0 14px rgba(244, 114, 182, 0.10);
  }


  .mode-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
    margin-top: 10px;
  }
  .mode-btn {
    min-width: 110px;
  }
  .btn.toggle-on {
    background: rgba(167, 139, 250, 0.12);
    border-color: rgba(167, 139, 250, 0.55);
    color: #efe8ff;
  }
  .btn.derive-live {
    background: linear-gradient(90deg, rgba(244, 114, 182, 0.22), rgba(255, 230, 109, 0.20));
    border-color: rgba(255, 230, 109, 0.65);
    color: #fff6d1;
    box-shadow: 0 0 18px rgba(244, 114, 182, 0.18);
  }
  .btn:disabled {
    opacity: 0.42;
    cursor: not-allowed;
  }
  .caption-bar {
    margin-top: 10px;
    min-height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 8px 12px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.05);
    background: rgba(12, 14, 20, 0.48);
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.9px;
    text-transform: uppercase;
  }
  .caption-bar.active {
    color: #f5ecff;
    border-color: rgba(167, 139, 250, 0.30);
    box-shadow: 0 0 18px rgba(167, 139, 250, 0.08) inset;
    background: linear-gradient(90deg, rgba(167, 139, 250, 0.12), rgba(244, 114, 182, 0.08));
  }
  .caption-bar.derive {
    color: #fff7db;
    border-color: rgba(255, 230, 109, 0.34);
    background: linear-gradient(90deg, rgba(244, 114, 182, 0.18), rgba(255, 230, 109, 0.14));
    box-shadow: 0 0 22px rgba(255, 230, 109, 0.08) inset;
  }
  body.scientific-mode {
    background:
      radial-gradient(circle at top center, rgba(167, 139, 250, 0.10), transparent 40%),
      radial-gradient(circle at 82% 18%, rgba(244, 114, 182, 0.08), transparent 32%),
      var(--bg);
  }
  body.derive-burst h1 {
    animation: glamPulse 1.2s ease-in-out infinite alternate;
  }
  body.derive-burst .panel {
    box-shadow: 0 0 0 1px rgba(255,255,255,0.04), 0 0 26px rgba(255, 230, 109, 0.12);
  }
  @keyframes glamPulse {
    from { text-shadow: 0 0 18px rgba(244, 114, 182, 0.22), 0 0 28px rgba(167, 139, 250, 0.16); }
    to { text-shadow: 0 0 28px rgba(255, 230, 109, 0.25), 0 0 38px rgba(244, 114, 182, 0.22); }
  }

</style>
</head>
<body>

<h1>Unit Circle Explorer</h1>
<p class="subtitle">Interactive trigonometry — drag the slider or click presets to explore</p>

<div class="container">
  <!-- LEFT: Unit Circle -->
  <div class="panel left-panel">
    <div class="panel-label">Unit Circle</div>
    <canvas id="circleCanvas" width="484" height="484"></canvas>
    <div class="controls">
      <div class="control-group">
        <label for="angleSlider">Angle (θ)</label>
        <input type="range" id="angleSlider" min="0" max="360" value="45" step="0.5">
      </div>
    </div>
    <div class="mode-row">
      <div class="toggle-group">
        <input type="checkbox" id="scientificToggle">
        <label for="scientificToggle">Scientific-er</label>
      </div>
      <button class="btn mode-btn" id="deriveBtn" type="button" disabled>Derive!</button>
      <button class="btn mode-btn" id="muteBtn" type="button" aria-pressed="true">Sound: On</button>
    </div>
    <div class="caption-bar" id="captionBar">Standard mode: pure trig.</div>
    <div class="info-boxes">
      <div class="info-box"><div class="label">Degrees</div><div class="value deg-val" id="degVal">45°</div></div>
      <div class="info-box"><div class="label">Radians</div><div class="value rad-val" id="radVal">π/4</div></div>
      <div class="info-box"><div class="label">sin(θ)</div><div class="value sin-val" id="sinVal">0.7071</div></div>
      <div class="info-box"><div class="label">cos(θ)</div><div class="value cos-val" id="cosVal">0.7071</div></div>
    </div>
    <div class="btn-row">
      <button class="btn" data-angle="0">0°</button>
      <button class="btn" data-angle="30">30°</button>
      <button class="btn active" data-angle="45">45°</button>
      <button class="btn" data-angle="60">60°</button>
      <button class="btn" data-angle="90">90°</button>
      <button class="btn" data-angle="120">120°</button>
      <button class="btn" data-angle="135">135°</button>
      <button class="btn" data-angle="150">150°</button>
      <button class="btn" data-angle="180">180°</button>
      <button class="btn" data-angle="210">210°</button>
      <button class="btn" data-angle="225">225°</button>
      <button class="btn" data-angle="270">270°</button>
      <button class="btn" data-angle="315">315°</button>
      <button class="btn" data-angle="360">360°</button>
    </div>
  </div>

  <!-- RIGHT: Graph -->
  <div class="panel right-panel">
    <div class="panel-label">sin(θ) &amp; cos(θ) vs θ</div>
    <canvas id="graphCanvas" width="600" height="484"></canvas>
    <div class="legend">
      <div class="legend-item"><div class="legend-swatch" style="background:var(--accent-sin)"></div>sin(θ)</div>
      <div class="legend-item"><div class="legend-swatch" style="background:var(--accent-cos)"></div>cos(θ)</div>
      <div class="legend-item"><div class="legend-swatch" style="background:var(--accent-angle); height:12px; width:2px;"></div>Current θ</div>
    </div>
  </div>
</div>

let currentAngle = 45; // degrees

function toRad(d) { return d * Math.PI / 180; }
function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

function formatRad(deg) {
  const nice = [
    [0,'0'],[30,'π/6'],[45,'π/4'],[60,'π/3'],[90,'π/2'],
    [120,'2π/3'],[135,'3π/4'],[150,'5π/6'],[180,'π'],
    [210,'7π/6'],[225,'5π/4'],[240,'4π/3'],[270,'3π/2'],
    [300,'5π/3'],[315,'7π/4'],[330,'11π/6'],[360,'2π']
  ];
  for (const [d,s] of nice) if (Math.abs(deg - d) < 0.5) return s;
  return (deg * Math.PI / 180).toFixed(3);
}

function roundRectPath(ctx, x, y, w, h, r) {
  const rr = Math.max(0, Math.min(r, Math.min(w, h) / 2));
  ctx.beginPath();
  ctx.moveTo(x + rr, y);
  ctx.lineTo(x + w - rr, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + rr);
  ctx.lineTo(x + w, y + h - rr);
  ctx.quadraticCurveTo(x + w, y + h, x + w - rr, y + h);
  ctx.lineTo(x + rr, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - rr);
  ctx.lineTo(x, y + rr);
  ctx.quadraticCurveTo(x, y, x + rr, y);
  ctx.closePath();
}

let glamPhase = 0;

function fitImage(img, maxW, maxH, scale = 1) {
  const iw = img.naturalWidth || 1;
  const ih = img.naturalHeight || 1;
  const fit = Math.min(maxW / iw, maxH / ih) * scale;
  return { w: iw * fit, h: ih * fit };
}

function drawSparkle(ctx, x, y, size, color, rotation = 0, alpha = 1) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rotation);
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = color;
  ctx.lineWidth = Math.max(1.2, size * 0.12);
  ctx.lineCap = 'round';
  for (let i = 0; i < 4; i++) {
    ctx.rotate(Math.PI / 4);
    ctx.beginPath();
    ctx.moveTo(-size, 0);
    ctx.lineTo(size, 0);
    ctx.stroke();
  }
  ctx.restore();
}

function drawSparkleRing(ctx, x, y, radius, color, seed = 0) {
  const count = 6;
  for (let i = 0; i < count; i++) {
    const a = seed + i * (Math.PI * 2 / count);
    const pulse = 0.72 + 0.28 * Math.sin(glamPhase * 3 + i * 1.13 + seed * 0.4);
    drawSparkle(
      ctx,
      x + Math.cos(a) * radius,
      y + Math.sin(a) * radius,
      4 + 4 * pulse,
      color,
      a,
      0.35 + 0.45 * pulse
    );
  }
}

function drawPhotoSprite(ctx, img, x, y, maxW, maxH, options = {}) {
  if (!img.complete || !img.naturalWidth) return;
  const {
    rotation = 0,
    scale = 1,
    anchorX = 0.5,
    anchorY = 1,
    glowColor = 'rgba(255,255,255,0.2)',
    shadowBlur = 16,
    shadowOffsetY = 0,
    floorGlow = false,
    floorGlowColor = 'rgba(255,255,255,0.12)',
    floorGlowWidth = maxW * 0.9,
    floorGlowHeight = Math.max(10, maxH * 0.16),
    opacity = 1
  } = options;

  const size = fitImage(img, maxW, maxH, scale);

  ctx.save();
  ctx.translate(x, y);

  if (floorGlow) {
    ctx.save();
    ctx.fillStyle = floorGlowColor;
    ctx.shadowColor = floorGlowColor;
    ctx.shadowBlur = 18;
    ctx.beginPath();
    ctx.ellipse(0, 0, floorGlowWidth / 2, floorGlowHeight / 2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  ctx.rotate(rotation);
  ctx.shadowColor = glowColor;
  ctx.shadowBlur = shadowBlur;
  ctx.shadowOffsetY = shadowOffsetY;
  ctx.globalAlpha = opacity;
  ctx.drawImage(img, -size.w * anchorX, -size.h * anchorY, size.w, size.h);
  ctx.restore();
}

function drawScientificBadge(ctx, text, x, y, accent = COLORS.angle) {
  ctx.save();
  ctx.font = '700 11px JetBrains Mono';
  const padX = 10;
  const w = ctx.measureText(text).width + padX * 2;
  const h = 22;
  ctx.translate(x, y);
  ctx.shadowColor = accent;
  ctx.shadowBlur = 18;
  ctx.fillStyle = 'rgba(12,14,20,0.72)';
  roundRectPath(ctx, -w / 2, -h / 2, w, h, 11);
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.lineWidth = 1.25;
  ctx.strokeStyle = 'rgba(255,255,255,0.16)';
  roundRectPath(ctx, -w / 2, -h / 2, w, h, 11);
  ctx.stroke();
  ctx.fillStyle = accent;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, 0, 0.5);
  ctx.restore();
}



const scientificCaptions = [
  'Scientific-er mode engaged.',
  'The angle is serving pure mathematics.',
  'sin(θ) has never looked this committed.',
  'cos(θ) is giving calibrated cheekbones.',
  'Observe the fierce geometry.'
];
const deriveCaptions = [
  'Blue Steel meets unit circle.',
  'So hot right now: derivation.',
  'Trigonometry, but make it runway.',
  'This curve is absolutely smoldering.',
  'Maximum glamorous rigor achieved.'
];

let audioCtx = null;
let isMuted = false;
let deriveBurstUntil = 0;
let lastCaptionTick = -1;
let lastCaptionSource = '';
let lastCaptionPlayedTick = -1;

function isDeriveBurstActive(now = performance.now()) {
  return scientificToggle.checked && now < deriveBurstUntil;
}

function getAudioCtx() {
  if (!audioCtx) {
    const AudioCtor = window.AudioContext || window.webkitAudioContext;
    if (!AudioCtor) return null;
    audioCtx = new AudioCtor();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playWhoosh(intensity = 1) {
  if (isMuted) return;
  const ac = getAudioCtx();
  if (!ac) return;
  const now = ac.currentTime;
  const dur = 0.26 + intensity * 0.08;
  const buffer = ac.createBuffer(1, Math.max(1, Math.floor(ac.sampleRate * dur)), ac.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < data.length; i++) {
    const t = i / data.length;
    data[i] = (Math.random() * 2 - 1) * (1 - t) * (0.7 + 0.3 * Math.sin(t * Math.PI));
  }
  const src = ac.createBufferSource();
  src.buffer = buffer;
  const filter = ac.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.setValueAtTime(320 + intensity * 150, now);
  filter.frequency.exponentialRampToValueAtTime(980 + intensity * 420, now + dur);
  filter.Q.value = 0.8;
  const gain = ac.createGain();
  gain.gain.setValueAtTime(0.0001, now);
  gain.gain.exponentialRampToValueAtTime(0.018 * intensity, now + 0.02);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + dur);
  src.connect(filter);
  filter.connect(gain);
  gain.connect(ac.destination);
  src.start(now);
  src.stop(now + dur + 0.02);
}

function playSparkle(intensity = 1) {
  if (isMuted) return;
  const ac = getAudioCtx();
  if (!ac) return;
  const now = ac.currentTime;
  const notes = [1100, 1450, 1890, 2300];
  notes.forEach((freq, idx) => {
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.type = idx % 2 === 0 ? 'triangle' : 'sine';
    const start = now + idx * 0.035;
    const dur = 0.09 + idx * 0.01;
    osc.frequency.setValueAtTime(freq * (0.92 + intensity * 0.04), start);
    gain.gain.setValueAtTime(0.0001, start);
    gain.gain.exponentialRampToValueAtTime((0.022 / (idx + 1)) * intensity, start + 0.012);
    gain.gain.exponentialRampToValueAtTime(0.0001, start + dur);
    osc.connect(gain);
    gain.connect(ac.destination);
    osc.start(start);
    osc.stop(start + dur + 0.02);
  });
}

function refreshCaption(force = false, now = performance.now()) {
  if (!captionBar) return;
  if (!scientificToggle.checked) {
    captionBar.textContent = 'Standard mode: pure trig.';
    captionBar.classList.remove('active', 'derive');
    lastCaptionSource = 'plain';
    return;
  }
  const deriveActive = isDeriveBurstActive(now);
  const source = deriveActive ? deriveCaptions : scientificCaptions;
  const tick = Math.floor(now / (deriveActive ? 1800 : 2600));
  const sourceName = deriveActive ? 'derive' : 'scientific';
  if (force || tick !== lastCaptionTick || lastCaptionSource !== sourceName) {
    captionBar.textContent = source[tick % source.length];
    lastCaptionTick = tick;
    lastCaptionSource = sourceName;
    if (!isMuted && deriveActive && tick !== lastCaptionPlayedTick) {
      playSparkle(0.38);
      lastCaptionPlayedTick = tick;
    }
  }
  captionBar.classList.add('active');
  captionBar.classList.toggle('derive', deriveActive);
}

function syncModeUI(force = false, now = performance.now()) {
  const deriveActive = isDeriveBurstActive(now);
  document.body.classList.toggle('scientific-mode', scientificToggle.checked);
  document.body.classList.toggle('derive-burst', deriveActive);
  if (subtitleEl) {
    subtitleEl.textContent = deriveActive
      ? 'Interactive trigonometry — ridiculously derived, glamorously precise'
      : scientificToggle.checked
        ? 'Interactive trigonometry — now with aggressively glamorous science'
        : 'Interactive trigonometry — drag the slider or click presets to explore';
  }
  if (deriveBtn) {
    deriveBtn.disabled = !scientificToggle.checked;
    deriveBtn.textContent = deriveActive ? 'Deriving…' : 'Derive!';
    deriveBtn.classList.toggle('derive-live', deriveActive);
  }
  if (muteBtn) {
    muteBtn.textContent = isMuted ? 'Sound: Off' : 'Sound: On';
    muteBtn.classList.toggle('toggle-on', !isMuted);
    muteBtn.setAttribute('aria-pressed', String(!isMuted));
  }
  refreshCaption(force, now);
}

// ─── UNIT CIRCLE ───
function drawCircle(angleDeg) {
  const W = circleCanvas.width, H = circleCanvas.height;
  const cx = W / 2, cy = H / 2, R = Math.min(W, H) * 0.372;
  const ctx = cCtx;
  ctx.clearRect(0, 0, W, H);

  const rad = toRad(angleDeg);
  const cosV = Math.cos(rad), sinV = Math.sin(rad);
  const px = cx + R * cosV, py = cy - R * sinV;

  // Grid
  ctx.strokeStyle = COLORS.grid; ctx.lineWidth = 1;
  for (let i = -4; i <= 4; i++) {
    const gx = cx + i * (R / 4);
    ctx.beginPath(); ctx.moveTo(gx, 30); ctx.lineTo(gx, H - 30); ctx.stroke();
    const gy = cy + i * (R / 4);
    ctx.beginPath(); ctx.moveTo(30, gy); ctx.lineTo(W - 30, gy); ctx.stroke();
  }

  // Axes
  ctx.strokeStyle = COLORS.border; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(30, cy); ctx.lineTo(W - 30, cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx, 30); ctx.lineTo(cx, H - 30); ctx.stroke();

  // Axis labels
  ctx.fillStyle = COLORS.dim; ctx.font = '600 13px JetBrains Mono'; ctx.textAlign = 'center';
  ctx.fillText('x', W - 22, cy - 8);
  ctx.fillText('y', cx + 12, 26);
  // tick labels
  ctx.font = '11px JetBrains Mono';
  ctx.fillText('1', cx + R, cy + 16);
  ctx.fillText('-1', cx - R, cy + 16);
  ctx.fillText('1', cx + 14, cy - R + 4);
  ctx.fillText('-1', cx + 16, cy + R + 4);

  // Unit circle
  ctx.strokeStyle = '#2a2e42'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI * 2); ctx.stroke();

  // Cos line (horizontal)
  ctx.strokeStyle = COLORS.cos; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(px, cy); ctx.stroke();

  // Sin line (vertical)
  ctx.strokeStyle = COLORS.sin; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(px, cy); ctx.lineTo(px, py); ctx.stroke();

  // Hypotenuse
  ctx.strokeStyle = COLORS.hyp; ctx.lineWidth = 2;
  ctx.setLineDash([6, 4]);
  ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(px, py); ctx.stroke();
  ctx.setLineDash([]);

  // Angle arc
  ctx.strokeStyle = COLORS.angle; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(cx, cy, Math.max(22, R * 0.17), 0, -rad, rad > 0); ctx.stroke();

  // θ label
  const labelRad = rad / 2;
  ctx.fillStyle = COLORS.angle; ctx.font = '600 14px JetBrains Mono'; ctx.textAlign = 'center';
  ctx.fillText('θ', cx + (R * 0.245) * Math.cos(-labelRad), cy + (R * 0.245) * Math.sin(-labelRad) + 5);

  // Right angle marker
  if (Math.abs(sinV) > 0.05 && Math.abs(cosV) > 0.05) {
    const s = Math.max(8, R * 0.055);
    const sx = cosV > 0 ? -s : s;
    const sy = sinV > 0 ? s : -s;
    ctx.strokeStyle = COLORS.dim; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(px + sx, cy);
    ctx.lineTo(px + sx, cy + sy);
    ctx.lineTo(px, cy + sy);
    ctx.stroke();
  }

  if (scientificToggle.checked) {
    const deriveActive = isDeriveBurstActive();
    const pulse = 1 + 0.06 * Math.sin(glamPhase * (deriveActive ? 8 : 5));
    const derekW = Math.max(58, Math.min(deriveActive ? 122 : 96, R * (deriveActive ? 0.60 : 0.48))) * pulse;
    const derekH = derekW * 1.08;
    const spin = -rad + 0.08 * Math.sin(glamPhase * 5 + rad * 2.4);

    ctx.save();
    ctx.fillStyle = deriveActive ? 'rgba(244, 114, 182, 0.10)' : 'rgba(255, 230, 109, 0.10)';
    ctx.shadowColor = deriveActive ? 'rgba(244, 114, 182, 0.24)' : 'rgba(255, 230, 109, 0.22)';
    ctx.shadowBlur = deriveActive ? 32 : 24;
    ctx.beginPath();
    ctx.arc(cx, cy, deriveActive ? R * 0.27 : R * 0.22, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    if (deriveActive) {
      ctx.save();
      ctx.strokeStyle = 'rgba(255, 230, 109, 0.28)';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([7, 5]);
      ctx.beginPath();
      ctx.arc(cx, cy, R * 0.29, glamPhase * 0.6, glamPhase * 0.6 + Math.PI * 1.6);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
      drawSparkleRing(ctx, cx, cy, R * 0.34, 'rgba(244, 114, 182, 0.95)', rad * 0.18 + 0.9);
      drawSparkleRing(ctx, cx, cy, R * 0.22, 'rgba(255, 230, 109, 0.95)', -rad * 0.14 + 0.3);
      drawPhotoSprite(ctx, derekImg, cx - 8, cy + 4, derekW * 0.94, derekH * 0.94, {
        rotation: spin - 0.16,
        anchorX: 0.5,
        anchorY: 0.5,
        glowColor: 'rgba(244, 114, 182, 0.10)',
        shadowBlur: 10,
        opacity: 0.18
      });
      drawPhotoSprite(ctx, derekImg, cx + 8, cy - 3, derekW * 0.96, derekH * 0.96, {
        rotation: spin + 0.13,
        anchorX: 0.5,
        anchorY: 0.5,
        glowColor: 'rgba(255, 230, 109, 0.10)',
        shadowBlur: 10,
        opacity: 0.16
      });
    } else {
      drawSparkleRing(ctx, cx, cy, R * 0.26, 'rgba(255, 230, 109, 0.92)', rad * 0.25);
    }

    drawPhotoSprite(ctx, derekImg, cx, cy, derekW, derekH, {
      rotation: spin,
      anchorX: 0.5,
      anchorY: 0.5,
      glowColor: deriveActive ? 'rgba(244, 114, 182, 0.34)' : 'rgba(255, 230, 109, 0.34)',
      shadowBlur: deriveActive ? 28 : 22,
      floorGlow: true,
      floorGlowColor: deriveActive ? 'rgba(244, 114, 182, 0.18)' : 'rgba(255, 230, 109, 0.15)',
      floorGlowWidth: derekW * 1.08,
      floorGlowHeight: derekW * 0.34
    });
    drawScientificBadge(ctx, deriveActive ? 'BLUE STEEL MODE' : 'SCIENTIFIC-ER', cx, H - 24, deriveActive ? COLORS.theta : COLORS.hyp);
  }

  // Point on circle
  ctx.fillStyle = COLORS.hyp;
  ctx.beginPath(); ctx.arc(px, py, 6, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#0c0e14';
  ctx.beginPath(); ctx.arc(px, py, 2.5, 0, Math.PI * 2); ctx.fill();

  // Value labels near lines
  ctx.font = '700 12px JetBrains Mono';
  // cos value
  const cosLabelX = (cx + px) / 2;
  ctx.fillStyle = COLORS.cos; ctx.textAlign = 'center';
  ctx.fillText(cosV.toFixed(3), cosLabelX, cy + (sinV >= 0 ? 20 : -10));
  // sin value
  const sinLabelY = (cy + py) / 2;
  ctx.fillStyle = COLORS.sin; ctx.textAlign = 'left';
  ctx.fillText(sinV.toFixed(3), px + (cosV >= 0 ? 8 : -58), sinLabelY + 4);

  // Coordinate label
  ctx.fillStyle = COLORS.text; ctx.font = '11px JetBrains Mono'; ctx.textAlign = 'center';
  const offY = sinV >= 0 ? -14 : 18;
  ctx.fillText(`(${cosV.toFixed(2)}, ${sinV.toFixed(2)})`, px, py + offY);
}

// ─── GRAPH ───
function drawGraph(angleDeg) {
  const W = graphCanvas.width, H = graphCanvas.height;
  const ctx = gCtx;
  ctx.clearRect(0, 0, W, H);

  const padL = 44, padR = 20, padT = 20, padB = 50;
  const gW = W - padL - padR;
  const gH = H - padT - padB;
  const originY = padT + gH / 2;
  const rad = toRad(angleDeg);

  // Grid
  ctx.strokeStyle = COLORS.grid; ctx.lineWidth = 1;
  const xTicks = [0, 90, 180, 270, 360];
  const xLabels = ['0', 'π/2', 'π', '3π/2', '2π'];
  for (let i = 0; i < xTicks.length; i++) {
    const x = padL + (xTicks[i] / 360) * gW;
    ctx.beginPath(); ctx.moveTo(x, padT); ctx.lineTo(x, padT + gH); ctx.stroke();
  }
  const yTicks = [-1, -0.5, 0, 0.5, 1];
  for (const v of yTicks) {
    const y = originY - v * (gH / 2);
    ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(padL + gW, y); ctx.stroke();
  }

  // Axes
  ctx.strokeStyle = COLORS.border; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(padL, originY); ctx.lineTo(padL + gW, originY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(padL, padT); ctx.lineTo(padL, padT + gH); ctx.stroke();

  // Axis labels
  ctx.fillStyle = COLORS.dim; ctx.font = '11px JetBrains Mono'; ctx.textAlign = 'center';
  for (let i = 0; i < xTicks.length; i++) {
    const x = padL + (xTicks[i] / 360) * gW;
    ctx.fillText(xLabels[i], x, padT + gH + 18);
  }
  ctx.fillText('θ', padL + gW + 12, originY + 4);
  ctx.textAlign = 'right';
  for (const v of yTicks) {
    const y = originY - v * (gH / 2);
    ctx.fillText(v.toFixed(1), padL - 6, y + 4);
  }

  // Plot sin
  ctx.strokeStyle = COLORS.sin; ctx.lineWidth = 2.5; ctx.beginPath();
  for (let d = 0; d <= 360; d += 1) {
    const x = padL + (d / 360) * gW;
    const y = originY - Math.sin(toRad(d)) * (gH / 2);
    d === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.stroke();

  // Plot cos
  ctx.strokeStyle = COLORS.cos; ctx.lineWidth = 2.5; ctx.beginPath();
  for (let d = 0; d <= 360; d += 1) {
    const x = padL + (d / 360) * gW;
    const y = originY - Math.cos(toRad(d)) * (gH / 2);
    d === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.stroke();

  // Vertical marker at current angle
  const markerX = padL + (angleDeg / 360) * gW;
  ctx.strokeStyle = COLORS.angle; ctx.lineWidth = 1.5; ctx.setLineDash([4, 4]);
  ctx.beginPath(); ctx.moveTo(markerX, padT); ctx.lineTo(markerX, padT + gH); ctx.stroke();
  ctx.setLineDash([]);

  // Dots
  const sinY = originY - Math.sin(rad) * (gH / 2);
  const cosY = originY - Math.cos(rad) * (gH / 2);
  ctx.fillStyle = COLORS.sin;
  ctx.beginPath(); ctx.arc(markerX, sinY, 6, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#0c0e14';
  ctx.beginPath(); ctx.arc(markerX, sinY, 2.5, 0, Math.PI * 2); ctx.fill();

  ctx.fillStyle = COLORS.cos;
  ctx.beginPath(); ctx.arc(markerX, cosY, 6, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#0c0e14';
  ctx.beginPath(); ctx.arc(markerX, cosY, 2.5, 0, Math.PI * 2); ctx.fill();

  // Horizontal dashed lines from dots to y-axis
  ctx.setLineDash([3, 3]); ctx.lineWidth = 1;
  ctx.strokeStyle = COLORS.sin;
  ctx.beginPath(); ctx.moveTo(markerX, sinY); ctx.lineTo(padL, sinY); ctx.stroke();
  ctx.strokeStyle = COLORS.cos;
  ctx.beginPath(); ctx.moveTo(markerX, cosY); ctx.lineTo(padL, cosY); ctx.stroke();
  ctx.setLineDash([]);

  if (scientificToggle.checked) {
    const deriveActive = isDeriveBurstActive();
    const dxD = gW / 360;
    const dyD = -(gH / 2) * Math.cos(rad) * (Math.PI / 180);
    const tangentAngle = Math.atan2(dyD, dxD);
    const slideRotation = tangentAngle + Math.PI / 2 + 0.10 * Math.sin(glamPhase * 4 + rad * 1.6);
    const hanselW = Math.max(28, Math.min(deriveActive ? 62 : 50, gW * (deriveActive ? 0.082 : 0.072)));
    const hanselH = hanselW * 2.35;

    if (deriveActive) {
      [-20, -10, 10, 20].forEach((offset, idx) => {
        const a = toRad(clamp(angleDeg + offset, 0, 360));
        const tx = padL + ((angleDeg + offset) / 360) * gW;
        const ty = originY - Math.sin(a) * (gH / 2);
        const localDx = gW / 360;
        const localDy = -(gH / 2) * Math.cos(a) * (Math.PI / 180);
        const localRot = Math.atan2(localDy, localDx) + Math.PI / 2;
        drawPhotoSprite(ctx, hanselImg, tx, ty, hanselW * 0.88, hanselH * 0.88, {
          rotation: localRot,
          anchorX: 0.5,
          anchorY: 0.90,
          glowColor: 'rgba(244, 114, 182, 0.10)',
          shadowBlur: 8,
          opacity: 0.09 + idx * 0.03
        });
      });
    }

    drawSparkleRing(ctx, markerX, sinY, deriveActive ? 24 : 18, deriveActive ? 'rgba(255, 230, 109, 0.88)' : 'rgba(244, 114, 182, 0.88)', rad * 0.4 + 0.8);
    drawPhotoSprite(ctx, hanselImg, markerX, sinY, hanselW, hanselH, {
      rotation: slideRotation,
      anchorX: 0.5,
      anchorY: 0.90,
      glowColor: deriveActive ? 'rgba(255, 230, 109, 0.28)' : 'rgba(244, 114, 182, 0.28)',
      shadowBlur: deriveActive ? 18 : 14,
      floorGlow: true,
      floorGlowColor: deriveActive ? 'rgba(255, 230, 109, 0.12)' : 'rgba(255, 107, 107, 0.14)',
      floorGlowWidth: hanselW * 0.92,
      floorGlowHeight: hanselW * 0.22
    });

    if (deriveActive) {
      drawScientificBadge(ctx, 'SO HOT RIGHT NOW', clamp(markerX, padL + 84, padL + gW - 84), clamp(sinY - 30, padT + 16, padT + gH - 18), COLORS.theta);
    }
  }
}

function update(angleDeg) {
  currentAngle = angleDeg;
  const rad = toRad(angleDeg);
  degEl.textContent = angleDeg.toFixed(1) + '°';
  radEl.textContent = formatRad(angleDeg);
  sinEl.textContent = Math.sin(rad).toFixed(4);
  cosEl.textContent = Math.cos(rad).toFixed(4);
  slider.value = angleDeg;
  syncModeUI(false);
  btns.forEach(b => b.classList.toggle('active', Math.abs(parseFloat(b.dataset.angle) - angleDeg) < 0.5));
  drawCircle(angleDeg);
  drawGraph(angleDeg);
}

slider.addEventListener('input', () => update(parseFloat(slider.value)));
scientificToggle.addEventListener('input', () => {
  if (!scientificToggle.checked) deriveBurstUntil = 0;
  if (scientificToggle.checked) {
    playWhoosh(0.8);
    playSparkle(0.45);
  }
  update(currentAngle);
});
deriveBtn.addEventListener('click', () => {
  if (!scientificToggle.checked) scientificToggle.checked = true;
  deriveBurstUntil = performance.now() + 6500;
  playWhoosh(1.25);
  playSparkle(1.25);
  update(currentAngle);
});
muteBtn.addEventListener('click', () => {
  isMuted = !isMuted;
  if (!isMuted) playSparkle(0.35);
  syncModeUI(true);
  drawCircle(currentAngle);
  drawGraph(currentAngle);
});
btns.forEach(b => b.addEventListener('click', () => update(parseFloat(b.dataset.angle))));
derekImg.addEventListener('load', () => update(currentAngle));
hanselImg.addEventListener('load', () => update(currentAngle));

function animate(timestamp) {
  glamPhase = timestamp * 0.001;
  if (scientificToggle.checked || document.body.classList.contains('derive-burst')) {
    syncModeUI(false, timestamp);
    drawCircle(currentAngle);
    drawGraph(currentAngle);
  }
  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);

// Responsive canvas sizing
function resize() {
  const leftPanel = document.querySelector('.left-panel');
  const rightPanel = document.querySelector('.right-panel');
  const cw = Math.min(leftPanel.clientWidth - 36, 484);
  circleCanvas.width = cw; circleCanvas.height = cw;
  const gw = Math.min(rightPanel.clientWidth - 36, 600);
  graphCanvas.width = gw; graphCanvas.height = Math.min(cw, 484);
  update(currentAngle);
}

window.addEventListener('resize', resize);
resize();
update(45);
</script>
</body>
</html>
